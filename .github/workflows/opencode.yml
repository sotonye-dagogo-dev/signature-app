name: opencode local trigger

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # Routes to the design pipeline. Note this still contains /oc or
  # /opencode — required unconditionally by anomalyco/opencode/github's
  # own internal check, no way around it. The word immediately following
  # is what disambiguates from opencode-dev below.
  opencode-design:
    if: |
      github.event.comment.body != '' &&
      (
        contains(github.event.comment.body, '/oc design') ||
        contains(github.event.comment.body, '/opencode design')
      )
    uses: sotonye-dagogo-dev/.github-workflows/.github/workflows/opendesign-runner.yml@main
    secrets: inherit

  # Everything else that mentions /oc or /opencode, EXCLUDING anything
  # opencode-design already claimed above. Mutual exclusivity is what
  # prevents both jobs firing on the same comment.
  opencode-dev:
    if: |
      github.event.comment.body != '' &&
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      ) &&
      !(
        contains(github.event.comment.body, '/oc design') ||
        contains(github.event.comment.body, '/opencode design')
      )
    uses: sotonye-dagogo-dev/.github-workflows/.github/workflows/opencode-runner.yml@main
    secrets: inherit